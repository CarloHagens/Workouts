services:
  api:
    image: jagger911/workouts-api:latest
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://workouts:workouts@db:5432/workouts?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workouts
      POSTGRES_PASSWORD: workouts
      POSTGRES_DB: workouts
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workouts"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
